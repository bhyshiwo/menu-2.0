<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>菜单点餐</title>
  <link rel="stylesheet" href="/customer/style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部头图 -->
    <header class="app-header" id="appHeader">
      <div class="header-bg" id="headerBg"></div>
      <div class="header-content">
        <h1 class="app-name" id="appName">我的餐厅</h1>
        <p class="app-slogan" id="appSlogan">新鲜美味，用心制作</p>
      </div>
      <button class="header-order-btn" id="headerOrderBtn" onclick="showOrderLookup()" title="查看订单">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>我的订单</span>
      </button>
    </header>

    <!-- 主体：左侧分类 + 右侧菜品 -->
    <main class="menu-container">
      <!-- 左侧分类栏 -->
      <aside class="category-bar" id="categoryBar">
        <!-- JS动态生成 -->
      </aside>

      <!-- 右侧菜品列表 -->
      <section class="dish-list" id="dishList">
        <!-- JS动态生成 -->
      </section>
    </main>

    <!-- 底部购物车栏 -->
    <footer class="cart-bar" id="cartBar" style="display:none;">
      <div class="cart-icon-wrapper" onclick="toggleCartDetail()">
        <div class="cart-icon" id="cartIcon">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
          </svg>
        </div>
        <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
      </div>
      <div class="cart-info">
        <div class="cart-total" id="cartTotal">¥0</div>
        <div class="cart-hint" id="cartHint">购物车是空的</div>
      </div>
      <button class="checkout-btn" id="checkoutBtn" onclick="goCheckout()" disabled>去结算</button>
    </footer>

    <!-- 购物车详情弹窗 -->
    <div class="cart-detail-mask" id="cartDetailMask" style="display:none;" onclick="toggleCartDetail()"></div>
    <div class="cart-detail" id="cartDetail" style="display:none;">
      <div class="cart-detail-header">
        <span class="cart-detail-title">购物车</span>
        <span class="cart-clear" onclick="clearCart()">清空</span>
      </div>
      <div class="cart-detail-list" id="cartDetailList">
        <!-- JS动态生成 -->
      </div>
    </div>

    <!-- 下单弹窗 -->
    <div class="checkout-mask" id="checkoutMask" style="display:none;" onclick="closeCheckout()"></div>
    <div class="checkout-modal" id="checkoutModal" style="display:none;">
      <div class="checkout-header">
        <h2>确认订单</h2>
        <span class="close-btn" onclick="closeCheckout()">&times;</span>
      </div>
      <div class="checkout-body">
        <div class="checkout-section">
          <label class="checkout-label">桌号/取餐号</label>
          <input type="text" id="tableNumber" class="checkout-input" placeholder="如：A1桌 或 自取001">
        </div>
        <div class="checkout-section">
          <label class="checkout-label">备注</label>
          <textarea id="remark" class="checkout-input checkout-textarea" placeholder="特殊要求（如：少辣、不要香菜等）"></textarea>
        </div>
        <div class="checkout-section">
          <label class="checkout-label">订单明细</label>
          <div class="order-items" id="orderItemsList">
            <!-- JS动态生成 -->
          </div>
        </div>
        <div class="checkout-section fee-section" id="feeSection" style="display:none;">
          <div class="fee-row"><span>餐位费</span><span id="tableFeeText">¥0</span></div>
          <div class="fee-row"><span>服务费</span><span id="serviceFeeText">¥0</span></div>
        </div>
      </div>
      <div class="checkout-footer">
        <div class="checkout-total">
          <span>合计</span>
          <span class="total-price" id="checkoutTotal">¥0</span>
        </div>
        <button class="submit-order-btn" id="submitOrderBtn" onclick="submitOrder()">提交订单</button>
      </div>
    </div>

    <!-- 订单成功弹窗 -->
    <div class="success-mask" id="successMask" style="display:none;">
      <div class="success-modal">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>下单成功！</h2>
        <p class="success-order-no" id="successOrderNo"></p>
        <p class="success-hint">请等待服务员确认</p>
        <button class="success-btn" onclick="viewOrderDetail()">查看订单</button>
        <button class="success-btn success-btn-secondary" onclick="closeSuccess()">继续点餐</button>
      </div>
    </div>

    <!-- 订单查询弹窗 -->
    <div class="order-lookup-mask" id="orderLookupMask" style="display:none;" onclick="closeOrderLookup()"></div>
    <div class="order-lookup-modal" id="orderLookupModal" style="display:none;">
      <div class="checkout-header">
        <h2>订单查询</h2>
        <span class="close-btn" onclick="closeOrderLookup()">&times;</span>
      </div>
      <div class="order-lookup-body">
        <p class="lookup-hint">输入下单后获得的订单号，查看订单状态</p>
        <div class="lookup-input-row">
          <input type="text" id="orderNoInput" class="checkout-input" placeholder="输入订单号，如 ORD12345678" maxlength="12" autocomplete="off">
          <button class="lookup-btn" onclick="lookupOrder()">查询</button>
        </div>
        <div class="lookup-error" id="lookupError" style="display:none;"></div>

        <!-- 最近查询的订单号 -->
        <div class="recent-orders" id="recentOrders" style="display:none;">
          <div class="recent-title">最近订单</div>
          <div class="recent-list" id="recentOrderList"></div>
        </div>
      </div>
    </div>

    <!-- 订单详情弹窗 -->
    <div class="checkout-mask" id="orderDetailMask" style="display:none;" onclick="closeOrderDetail()"></div>
    <div class="checkout-modal order-detail-modal" id="orderDetailModal" style="display:none;">
      <div class="checkout-header">
        <h2>订单详情</h2>
        <span class="close-btn" onclick="closeOrderDetail()">&times;</span>
      </div>
      <div class="checkout-body" id="orderDetailBody">
        <!-- JS动态生成 -->
      </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <span class="loading-text">正在加载菜单...</span>
    </div>
  </div>

  <script src="/customer/app.js"></script>
</body>
</html>
